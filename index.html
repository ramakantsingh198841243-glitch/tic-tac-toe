<!DOCTYPE html>
<html>
<head>
  <title>Ultimate Tic Tac Toe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
      text-align: center;
    }

    h1 { margin-top: 15px; }

    .controls {
      margin: 10px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3,100px);
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .cell {
      width:100px;
      height:100px;
      background:white;
      color:black;
      font-size:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:15px;
      cursor:pointer;
      transition:0.2s;
    }

    .cell:hover { background:#ddd; }

    .scoreboard {
      margin-top:15px;
      font-size:18px;
    }

    button {
      padding:8px 15px;
      margin:5px;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    @media(max-width:400px){
      .board{
        grid-template-columns:repeat(3,80px);
      }
      .cell{
        width:80px;
        height:80px;
      }
    }
  </style>
</head>
<body>

<h1>🔥 Ultimate Tic Tac Toe</h1>

<div class="controls">
  <button onclick="setMode('ai')">Play vs AI</button>
  <button onclick="setMode('2p')">2 Player</button>
  <button onclick="resetGame()">Restart</button>
</div>

<div class="scoreboard">
  X: <span id="xScore">0</span> |
  O: <span id="oScore">0</span>
</div>

<div id="status">Turn: X</div>
<div class="board" id="board"></div>

<script>
let board = ["","","","","","","","",""];
let currentPlayer = "X";
let gameActive = true;
let mode = "ai";

let xScore = localStorage.getItem("xScore") || 0;
let oScore = localStorage.getItem("oScore") || 0;
document.getElementById("xScore").textContent = xScore;
document.getElementById("oScore").textContent = oScore;

const winCombos = [
[0,1,2],[3,4,5],[6,7,8],
[0,3,6],[1,4,7],[2,5,8],
[0,4,8],[2,4,6]
];

function createBoard(){
  const gameBoard = document.getElementById("board");
  gameBoard.innerHTML="";
  board.forEach((cell,i)=>{
    const div=document.createElement("div");
    div.classList.add("cell");
    div.dataset.index=i;
    div.textContent=cell;
    div.addEventListener("click",handleClick);
    gameBoard.appendChild(div);
  });
}
createBoard();

function handleClick(e){
  const index=e.target.dataset.index;
  if(board[index]!==""||!gameActive) return;

  makeMove(index,currentPlayer);

  if(mode==="ai" && gameActive && currentPlayer==="O"){
    setTimeout(()=>{
      let bestMove=minimax(board,"O").index;
      makeMove(bestMove,"O");
    },300);
  }
}

function makeMove(index,player){
  board[index]=player;
  document.querySelectorAll(".cell")[index].textContent=player;
  playSound();

  if(checkWinner(player)){
    document.getElementById("status").textContent=player+" Wins!";
    updateScore(player);
    gameActive=false;
    return;
  }

  if(!board.includes("")){
    document.getElementById("status").textContent="Draw!";
    gameActive=false;
    return;
  }

  currentPlayer = player==="X"?"O":"X";
  document.getElementById("status").textContent="Turn: "+currentPlayer;
}

function checkWinner(player){
  return winCombos.some(combo =>
    combo.every(i=>board[i]===player)
  );
}

function updateScore(player){
  if(player==="X"){ xScore++; localStorage.setItem("xScore",xScore); }
  else { oScore++; localStorage.setItem("oScore",oScore); }
  document.getElementById("xScore").textContent=xScore;
  document.getElementById("oScore").textContent=oScore;
}

function resetGame(){
  board=["","","","","","","","",""];
  currentPlayer="X";
  gameActive=true;
  document.getElementById("status").textContent="Turn: X";
  createBoard();
}

function setMode(selected){
  mode=selected;
  resetGame();
}

function playSound(){
  const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
  audio.play();
}

/* ===== IMPOSSIBLE AI (MINIMAX) ===== */

function minimax(newBoard, player){
  let availSpots = newBoard.map((v,i)=>v===""?i:null).filter(v=>v!==null);

  if(checkWinnerMinimax(newBoard,"X")) return {score:-10};
  if(checkWinnerMinimax(newBoard,"O")) return {score:10};
  if(availSpots.length===0) return {score:0};

  let moves=[];

  for(let i=0;i<availSpots.length;i++){
    let move={};
    move.index=availSpots[i];
    newBoard[availSpots[i]]=player;

    if(player==="O"){
      let result=minimax(newBoard,"X");
      move.score=result.score;
    } else {
      let result=minimax(newBoard,"O");
      move.score=result.score;
    }

    newBoard[availSpots[i]]="";
    moves.push(move);
  }

  let bestMove;
  if(player==="O"){
    let bestScore=-10000;
    for(let i=0;i<moves.length;i++){
      if(moves[i].score>bestScore){
        bestScore=moves[i].score;
        bestMove=i;
      }
    }
  } else {
    let bestScore=10000;
    for(let i=0;i<moves.length;i++){
      if(moves[i].score<bestScore){
        bestScore=moves[i].score;
        bestMove=i;
      }
    }
  }

  return moves[bestMove];
}

function checkWinnerMinimax(b,p){
  return winCombos.some(combo =>
    combo.every(i=>b[i]===p)
  );
}

</script>
</body>
</html>
